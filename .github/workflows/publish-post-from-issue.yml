name: Publish Post from Issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: |
      github.event.label.name == 'publish' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create post file
        env:
          TITLE: ${{ github.event.issue.title }}
          CONTENT: ${{ github.event.issue.body }}
        run: |
          python3 - <<'EOF'
          import os, re
          from datetime import date

          title = os.environ["TITLE"]
          content = os.environ["CONTENT"]

          today = date.today().isoformat()
          slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")
          filename = f"_posts/{today}-{slug}.md"

          safe_title = title.replace('"', '\\"')
          front_matter = f'---\nlayout: post\ntitle: "{safe_title}"\ndate: {today}\ncategories:\n---\n\n'

          with open(filename, "w") as f:
              f.write(front_matter + content + "\n")

          print(f"Created: {filename}")
          EOF

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ github.event.issue.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add _posts/
          git commit -m "Add post: ${TITLE}"
          git push

      - name: Close issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Published as a blog post."
